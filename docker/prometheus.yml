# Prometheus scrape configuration for CognitX services
# All services expose GET /metrics (Prometheus text format)
#
# Local dev: services run on the host → targets use host.docker.internal
# Production: swap targets to container hostnames (auth:8000, etc.)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # ── Application Services ──
  - job_name: "auth"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: "auth"

  - job_name: "tools"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8002"]
        labels:
          service: "tools"

  - job_name: "intelligence"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8004"]
        labels:
          service: "intelligence"

  - job_name: "workflow"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8005"]
        labels:
          service: "workflow"

  # ── Inference (cognitx-serving) ──
  - job_name: "inference"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8003"]
        labels:
          service: "inference"

  # ── SGLang Gateway (Rust router metrics) ──
  - job_name: "sglang-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:29000"]
        labels:
          service: "sglang-gateway"

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
